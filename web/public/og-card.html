<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG Card</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1200px;
        height: 630px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background:
          radial-gradient(ellipse at top right, rgba(16, 185, 129, 0.18) 0%, transparent 50%),
          radial-gradient(ellipse at bottom left, rgba(244, 63, 94, 0.12) 0%, transparent 50%),
          #020617;
        color: #fff;
        overflow: hidden;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 80px 90px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(251, 191, 36, 0.12);
        border: 1px solid rgba(251, 191, 36, 0.4);
        color: #fbbf24;
        font-size: 18px;
        font-weight: 800;
        padding: 10px 18px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        width: fit-content;
      }
      h1 {
        font-size: 86px;
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -0.025em;
        margin-top: 32px;
      }
      h1 .accent {
        color: #34d399;
      }
      .sub {
        margin-top: 24px;
        font-size: 28px;
        color: #cbd5e1;
        font-weight: 500;
        line-height: 1.4;
        max-width: 900px;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .logo {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 900;
        box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
      }
      .brand-text {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .brand-handle {
        font-size: 16px;
        color: #94a3b8;
        margin-top: 2px;
      }
      .stats {
        display: flex;
        gap: 36px;
      }
      .stat {
        text-align: right;
      }
      .stat .num {
        font-family: ui-monospace, 'SF Mono', monospace;
        font-size: 32px;
        font-weight: 900;
        line-height: 1;
      }
      .stat.green .num { color: #34d399; }
      .stat.gold .num { color: #fbbf24; }
      .stat .lbl {
        font-size: 12px;
        font-weight: 700;
        color: #94a3b8;
        margin-top: 6px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div>
        <div class="badge">FREE · NO SIGNUP · TELEGRAM</div>
        <h1>Practice crypto futures with <span class="accent">$10,000</span> virtual USD.</h1>
        <p class="sub">Real Binance prices. Up to 125x leverage. Zero financial risk. Inside Telegram.</p>
      </div>
      <div class="footer">
        <div class="brand">
          <div class="logo">TG</div>
          <div>
            <div class="brand-text">Trader Games</div>
            <div class="brand-handle">@Tradergames_bot</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat green"><div class="num">125x</div><div class="lbl">Max Leverage</div></div>
          <div class="stat gold"><div class="num">$10K</div><div class="lbl">Daily Seed</div></div>
        </div>
      </div>
    </div>
  </body>
</html>
