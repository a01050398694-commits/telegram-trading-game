<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- Stage 8.6 — 핀치줌 원천 차단. user-scalable=no + maximum-scale=1.0 둘 다 명시.
         viewport-fit=cover 유지(iOS 노치 대응). iOS Safari 는 이 meta 를 무시할 수 있어
         main.tsx 의 gesturestart preventDefault 와 index.css 의 touch-action: manipulation
         으로 3중 방어. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Trader Games — Free Paper Trading on Telegram</title>
    <meta name="description" content="Free crypto futures paper trading inside Telegram. Practice with $10,000 virtual USD. No risk, no signup. Compete on the leaderboard." />
    <meta name="keywords" content="paper trading, crypto futures simulator, telegram bot, virtual trading, leverage practice, free trading game" />
    <link rel="canonical" href="https://telegram-trading-game.vercel.app/" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Trader Games — Free Paper Trading on Telegram" />
    <meta property="og:description" content="Practice crypto futures with $10K virtual USD. Free, in-Telegram, no signup. Climb the global leaderboard." />
    <meta property="og:url" content="https://telegram-trading-game.vercel.app/" />
    <meta property="og:image" content="https://telegram-trading-game.vercel.app/og-image.png" />
    <meta property="og:site_name" content="Trader Games" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trader Games — Free Paper Trading" />
    <meta name="twitter:description" content="$10K virtual USD. Crypto futures practice inside Telegram. Free." />
    <meta name="twitter:image" content="https://telegram-trading-game.vercel.app/og-image.png" />
    <!-- JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Trader Games",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Telegram",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "description": "Free crypto futures paper trading inside Telegram with $10K virtual USD."
      }
    </script>
    <!-- Telegram Web App SDK: 텔레그램 클라이언트 내부에서 열릴 때 window.Telegram.WebApp 제공 -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <script>
      // 텔레그램 미니앱 스플래시 직후 풀스크린 확장 (소비자 관점 UX)
      window.addEventListener('DOMContentLoaded', () => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.expand();
          window.Telegram.WebApp.ready();
        }
      });
    </script>
  </head>
  <body class="bg-slate-900 text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
