name: DB Backup

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dump Supabase database via postgres:17 image
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date -u +%Y%m%d-%H%M)
          docker run --rm -e PGURL="$DATABASE_URL" postgres:17 \
            sh -c 'pg_dump "$PGURL" --no-owner --no-privileges --clean --if-exists' \
            > "backup-${DATE}.sql"
          gzip "backup-${DATE}.sql"
          ls -lh backup-*.sql.gz

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*.sql.gz
          retention-days: 30
